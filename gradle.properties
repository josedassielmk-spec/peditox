# Aumenta la memoria disponible para gradle.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# IntelliJ IDEA todavia no es 100% compatible con configuration cache.
org.gradle.configuration-cache=false

# Fabric Properties
# revisa/actualiza estos valores en https://fabricmc.net/develop
minecraft_version=26.2
loader_version=0.19.3
loom_version=1.17.12

# Mod Properties
mod_version=1.0.0
maven_group=net.pedito.mod
archives_base_name=pedito

# Dependencies
# Version confirmada para minecraft_version=26.2 (rama 26.2 del repo FabricMC/fabric-api).
# Si tu build falla en esta linea, revisa la version recomendada actual en https://fabricmc.net/develop
fabric_api_version=0.155.2+26.2

# Custom Java Installation path for Toolchain
org.gradle.java.installations.paths=/app/applet/jdk-25.0.3

