name: Build Pedito Mod
# Se dispara al pushear/hacer PR a main, y tambien manualmente desde la pestana Actions.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    # Configuramos que todos los pasos de ejecucion 'run' se ubiquen dentro de la carpeta del mod
    defaults:
      run:
        working-directory: pedito-mod-main

    steps:
    - name: Checkout del repo
      uses: actions/checkout@v4

    # fabric.mod.json pide java >= 25, asi que compilamos con Temurin 25.
    - name: Configurar JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'

    # Solo damos permisos de ejecucion en Linux o macOS (en Windows no es necesario)
    - name: Dar permisos de ejecucion al gradlew
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew

    # Cachea dependencias de Gradle/Loom entre corridas para que sea mas rapido.
    - name: Configurar cache de Gradle
      uses: gradle/actions/setup-gradle@v4

    # Detecta el sistema operativo y ejecuta el comando de Gradle correcto (.bat para Windows)
    - name: Compilar con Gradle (Fabric Loom)
      run: |
        if ("${{ runner.os }}" -eq "Windows") {
          .\gradlew.bat build --stacktrace
        } else {
          ./gradlew build --stacktrace
        }

    # Sube el/los .jar generados (mod + sources) como artefacto descargable de la corrida.
    # Especificamos la ruta correcta dentro de la subcarpeta 'pedito-mod-main'
    - name: Subir jars compilados
      uses: actions/upload-artifact@v4
      with:
        name: pedito-mod-jars
        path: pedito-mod-main/build/libs/*.jar
        if-no-files-found: error