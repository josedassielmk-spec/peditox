name: Build Pedito Mod
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4
      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Configurar cache de Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Compilar con Gradle (Fabric Loom)
        run: ./gradlew.bat build --stacktrace
      - name: Subir jars compilados
        uses: actions/upload-artifact@v4
        with:
          name: pedito-mod-jars
          path: build/libs/*.jar
          if-no-files-found: error